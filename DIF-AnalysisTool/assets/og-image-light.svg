<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DIF-AnalysisTool light preview">
  <style>
    :root {
      --c-bg-1:    #f4f6f9;
      --c-bg-2:    #e8ecf2;
      --c-surface: #ffffff;
      --c-card:    #f4f6f9;
      --c-border:  #dde1e7;
      --c-text:    #3a4658;
      --c-blue:    #58a6ff;
      --c-red:     #f85149;
      --c-gray:    #6e7681;
      --c-dim:     #94a3b8;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--c-bg-1)"/>
      <stop offset="100%" stop-color="var(--c-bg-2)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="var(--c-surface)" stroke="var(--c-border)"/>

  <text x="112" y="156" fill="var(--c-blue)" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DIF-AnalysisTool</text>
  <text x="112" y="210" fill="var(--c-text)" font-size="45" font-family="Segoe UI, Arial, sans-serif">Mantel-Haenszel · TSW · Iterative purification</text>

  <!-- Inner content panel -->
  <rect x="112" y="264" width="976" height="270" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>

  <!-- Center reference line (OR = 1 / no DIF) -->
  <line x1="600" y1="272" x2="600" y2="526" stroke="var(--c-dim)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Item bars -->
  <line x1="600" y1="292" x2="672" y2="292" stroke="var(--c-blue)" stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="350" x2="852" y2="350" stroke="var(--c-red)"  stroke-width="18" stroke-linecap="round"/>
  <line x1="546" y1="408" x2="600" y2="408" stroke="var(--c-blue)" stroke-width="18" stroke-linecap="round"/>
  <line x1="372" y1="466" x2="600" y2="466" stroke="var(--c-red)"  stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="516" x2="644" y2="516" stroke="var(--c-gray)" stroke-width="14" stroke-linecap="round"/>
</svg>
