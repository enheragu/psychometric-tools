<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Psychometric Tools social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- DIF crossing-clip: split the right card at the curve inflection midpoint (x=850) -->
    <clipPath id="dif-left">
      <rect x="620" y="264" width="230" height="284"/>
    </clipPath>
    <clipPath id="dif-right">
      <rect x="850" y="264" width="230" height="284"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#161b22" stroke="#30363d"/>

  <!-- Title + subtitle (same position/size as tool og-images) -->
  <text x="112" y="156" fill="#58a6ff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Psychometric Tools</text>
  <text x="112" y="210" fill="#e6edf3" font-size="45" font-family="Segoe UI, Arial, sans-serif">Psychometric tools for research and analysis</text>

  <!-- ── Card 1: C-NRSBTool ──────────────────────────────────────────── -->
  <rect x="120" y="264" width="460" height="284" rx="12" fill="#0f1725" stroke="#30363d"/>

  <!--
    3 bars from C-NRSBTool og-image, proportional lengths:
      blue  678/928 = 73% → 278 px
      yellow 828/928 = 89% → 339 px
      green  928/928 = 100% → 380 px
    Content x: 162–542 (380 px).  Bars centred vertically at 336, 406, 476.
  -->
  <line x1="162" y1="336" x2="440" y2="336" stroke="#58a6ff"  stroke-width="22" stroke-linecap="round"/>
  <line x1="162" y1="406" x2="501" y2="406" stroke="#d29922"  stroke-width="22" stroke-linecap="round"/>
  <line x1="162" y1="476" x2="542" y2="476" stroke="#3fb950"  stroke-width="22" stroke-linecap="round"/>


  <!-- ── Card 2: DIF-AccumulationTool ───────────────────────────────── -->
  <rect x="620" y="264" width="460" height="284" rx="12" fill="#0f1725" stroke="#30363d"/>

  <!--
    ICC curves from DIF og-image left panel, scaled 1.46× (width-constrained).
    Original paths in 300×252 panel space:
      sigLeft:  M 20 200  L  70 200  C 130 200, 130  50, 190  50  L 280 50
      sigRight: M 20 200  L 110 200  C 170 200, 170  50, 230  50  L 280 50
    Offset (631, 204) centres the 219-px-tall visual in the card content area.
    Crossing clip midpoint: x = 631 + 150×1.46 = 850.

    Left half  → sigRight (yellow-dashed) behind sigLeft (blue, on top)
    Right half → sigLeft  (blue, behind)   sigRight (yellow-dashed, on top)
  -->
  <!-- left half -->
  <path d="M 660 516 L 792 516 C 879 516, 879 297, 967 297 L 1040 297"
        fill="none" stroke="#d29922" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="12 9" clip-path="url(#dif-left)"/>
  <path d="M 660 516 L 703 516 C 821 516, 821 297, 908 297 L 1040 297"
        fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round"
        clip-path="url(#dif-left)"/>
  <!-- right half -->
  <path d="M 660 516 L 703 516 C 821 516, 821 297, 908 297 L 1040 297"
        fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round"
        clip-path="url(#dif-right)"/>
  <path d="M 660 516 L 792 516 C 879 516, 879 297, 967 297 L 1040 297"
        fill="none" stroke="#d29922" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="12 9" clip-path="url(#dif-right)"/>
</svg>
