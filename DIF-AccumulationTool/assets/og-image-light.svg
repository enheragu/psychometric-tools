<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DIF-AccumulationTool light preview">
  <style>
    :root {
      --c-bg-1:    #f4f6f9;
      --c-bg-2:    #e8ecf2;
      --c-surface: #ffffff;
      --c-card:    #f4f6f9;
      --c-border:  #dde1e7;
      --c-text:    #3a4658;
      --c-blue:    #58a6ff;
      --c-green:   #3fb950;
      --c-red:     #f85149;
      --c-amber:   #d29922;
      --c-purple:  #bc8cff;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--c-bg-1)"/>
      <stop offset="100%" stop-color="var(--c-bg-2)"/>
    </linearGradient>

    <path id="sigLeft"   d="M 20 200 L 70  200 C 130 200, 130 50, 190 50 L 280 50" />
    <path id="sigRight"  d="M 20 200 L 110 200 C 170 200, 170 50, 230 50 L 280 50" />
    <path id="sigCenter" d="M 20 200 L 90  200 C 150 200, 150 50, 210 50 L 280 50" />

    <clipPath id="mitadIzquierda">
      <rect x="0" y="0" width="150" height="252" />
    </clipPath>
    <clipPath id="mitadDerecha">
      <rect x="150" y="0" width="150" height="252" />
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="var(--c-surface)" stroke="var(--c-border)"/>

  <text x="112" y="156" fill="var(--c-blue)" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DIF-AccumulationTool</text>
  <text x="112" y="210" fill="var(--c-text)" font-size="45" font-family="Segoe UI, Arial, sans-serif">Differential Item Functioning accumulation sim</text>

  <rect x="112" y="264" width="300" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>
  <rect x="450" y="264" width="300" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>
  <rect x="788" y="264" width="300" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>

  <g transform="translate(112, 264)">
    <g clip-path="url(#mitadIzquierda)">
      <use href="#sigRight" fill="none" stroke="var(--c-amber)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
      <use href="#sigLeft"  fill="none" stroke="var(--c-blue)"  stroke-width="4" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#mitadDerecha)">
      <use href="#sigLeft"  fill="none" stroke="var(--c-blue)"  stroke-width="4" stroke-linecap="round"/>
      <use href="#sigRight" fill="none" stroke="var(--c-amber)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
    </g>
  </g>

  <g transform="translate(450, 264)">
    <use href="#sigCenter" fill="none" stroke="var(--c-green)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(788, 264)">
    <g clip-path="url(#mitadIzquierda)">
      <use href="#sigRight" fill="none" stroke="var(--c-purple)" stroke-width="4" stroke-linecap="round"/>
      <use href="#sigLeft"  fill="none" stroke="var(--c-red)"    stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
    </g>
    <g clip-path="url(#mitadDerecha)">
      <use href="#sigLeft"  fill="none" stroke="var(--c-red)"    stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
      <use href="#sigRight" fill="none" stroke="var(--c-purple)" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
</svg>
