<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="C-NRSBTool light preview">
  <style>
    :root {
      --c-bg-1:    #f4f6f9;
      --c-bg-2:    #e8ecf2;
      --c-surface: #ffffff;
      --c-border:  #dde1e7;
      --c-text:    #3a4658;
      --c-blue:    #58a6ff;
      --c-green:   #3fb950;
      --c-amber:   #d29922;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--c-bg-1)"/>
      <stop offset="100%" stop-color="var(--c-bg-2)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="var(--c-surface)" stroke="var(--c-border)"/>

  <text x="112" y="156" fill="var(--c-blue)" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">C-NRSBTool</text>
  <text x="112" y="210" fill="var(--c-text)" font-size="45" font-family="Segoe UI, Arial, sans-serif">Country sample selection bias analysis by HDI</text>

  <line x1="112" y1="369" x2="790"  y2="369" stroke="var(--c-blue)"  stroke-width="22" stroke-linecap="round"/>
  <line x1="112" y1="437" x2="940"  y2="437" stroke="var(--c-amber)" stroke-width="22" stroke-linecap="round"/>
  <line x1="112" y1="505" x2="1040" y2="505" stroke="var(--c-green)" stroke-width="22" stroke-linecap="round"/>
</svg>
