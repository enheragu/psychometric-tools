<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DIF-AnalysisTool">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#161b22" stroke="#30363d"/>

  <text x="112" y="156" fill="#58a6ff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DIF-AnalysisTool</text>
  <text x="112" y="210" fill="#e6edf3" font-size="45" font-family="Segoe UI, Arial, sans-serif">Mantel-Haenszel · TSW · Iterative purification</text>

  <!-- Inner content panel -->
  <rect x="112" y="264" width="976" height="270" rx="12" fill="#0f1725" stroke="#30363d"/>

  <!-- Center reference line (OR = 1 / no DIF) -->
  <line x1="600" y1="272" x2="600" y2="526" stroke="#3d4d5c" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Item bars radiating from center — short = no DIF (blue), long = DIF (red) -->
  <line x1="600" y1="292" x2="672" y2="292" stroke="#58a6ff" stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="350" x2="852" y2="350" stroke="#f85149" stroke-width="18" stroke-linecap="round"/>
  <line x1="546" y1="408" x2="600" y2="408" stroke="#58a6ff" stroke-width="18" stroke-linecap="round"/>
  <line x1="372" y1="466" x2="600" y2="466" stroke="#f85149" stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="516" x2="644" y2="516" stroke="#8b949e" stroke-width="14" stroke-linecap="round"/>
</svg>
