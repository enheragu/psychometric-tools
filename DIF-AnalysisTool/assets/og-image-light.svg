<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DIF-AnalysisTool light preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e8edf3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#ffffff" stroke="#d0d7de"/>

  <text x="112" y="156" fill="#0969da" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DIF-AnalysisTool</text>
  <text x="112" y="210" fill="#1f2328" font-size="45" font-family="Segoe UI, Arial, sans-serif">Mantel-Haenszel · TSW · Iterative purification</text>

  <!-- Inner content panel -->
  <rect x="112" y="264" width="976" height="270" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>

  <!-- Center reference line (OR = 1 / no DIF) -->
  <line x1="600" y1="272" x2="600" y2="526" stroke="#b3bcc5" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Item bars -->
  <line x1="600" y1="292" x2="672" y2="292" stroke="#0969da" stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="350" x2="852" y2="350" stroke="#cf222e" stroke-width="18" stroke-linecap="round"/>
  <line x1="546" y1="408" x2="600" y2="408" stroke="#0969da" stroke-width="18" stroke-linecap="round"/>
  <line x1="372" y1="466" x2="600" y2="466" stroke="#cf222e" stroke-width="18" stroke-linecap="round"/>
  <line x1="600" y1="516" x2="644" y2="516" stroke="#57606a" stroke-width="14" stroke-linecap="round"/>
</svg>
