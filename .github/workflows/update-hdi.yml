name: Update HDI dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 */2 *"

permissions:
  contents: write

jobs:
  update-hdi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update HDI data files
        run: python C-NRSBTool/scripts/update_country_data.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No HDI changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add C-NRSBTool/data/hdi.csv C-NRSBTool/data/income_groups.csv C-NRSBTool/data/metadata.json C-NRSBTool/data/country_aliases.json
          git commit -m "chore(data): update HDI snapshot"
          git push
